services:
  db:
    image: postgres:16
    container_name: inspectra-db
    environment:
      POSTGRES_DB: inspectra
      POSTGRES_USER: inspectra
      POSTGRES_PASSWORD: inspectra
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspectra -d inspectra"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: inspectra-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inspectra-api
    command: ["/app/backend/scripts/docker-api-entrypoint.sh"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inspectra-worker
    command: ["/app/backend/scripts/docker-worker-entrypoint.sh"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: inspectra-ui
    ports:
      - "${UI_PORT:-18080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
